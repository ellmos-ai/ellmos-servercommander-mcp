# ellmos-servercommander-mcp configuration
# Copy to ~/.servercommander/config.toml and adjust.

[server]
name = "ellmos-servercommander"
# Tool metadata language: en, de, es, zh, ja, ru
language = "en"

# --- Deploy profiles ---
[deploy]
# Keeps deployment execution disabled, but can persist dry-run plans locally.
persist_history = false
history_db = "~/.servercommander/deploy_history.db"

[deploy.profiles.example_site]
host = "sftp.example.com"
user = "deploy-user"
remote_path = "/var/www/example"
local_path = "./dist"
protocol = "sftp"
# password = "$SFTP_PASSWORD"    # Use environment variables for secrets.

# [deploy.profiles.other]
# host = "..."

# --- Mail ---
[mail]
# IMAP is required for list/read/search readiness; SMTP is required for send readiness.
# execution_enabled = false (default): every handler reports readiness only and
#   never opens a connection.
# execution_enabled = true: sc_mail_list performs a live, read-only IMAP
#   reachability probe (connect + list folders) by reusing the canonical
#   mail-connector module -- ServerCommander does not reimplement an IMAP client.
#   Message-level read/search stay the mail-connector module's domain; SMTP send
#   is never executed in the alpha.
execution_enabled = false
imap_host = "imap.example.com"
imap_port = 993
smtp_host = "smtp.example.com"
smtp_port = 587
username = "$MAIL_USER"
password = "$MAIL_PASSWORD"
cache_db = "~/.servercommander/mail_cache.db"
# Optional: override where the mail-connector module is located.
# mail_connector_path via env: SERVERCOMMANDER_MAIL_CONNECTOR_PATH

# --- Log analysis ---
[logs]
default_format = "apache"   # apache | nginx
persist_reports = false
reports_dir = "~/.servercommander/log_reports"

# --- Health checks ---
[health]
timeout = 5
endpoints = [
    "https://example.com/health",
]
